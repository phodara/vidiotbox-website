<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
}

.wrap {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 14px 14px;
    box-sizing: border-box;
}

.card {
    width: 100%;
    max-width: 420px;
    background: #000;
    border: 2px solid #2a6f78;
    padding: 28px;
    box-sizing: border-box;
    text-align: center;
}

.createdby {
    color: #bbbbbb;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
}

.logo {
    font-size: 44px;
    font-weight: bold;
    color: #00E5FF;
    margin-bottom: 12px;
    letter-spacing: 2px;
    line-height: 1.1;
}

.tagline {
    color: #bbbbbb;
    font-size: 15px;
    line-height: 1.4;
    margin-bottom: 24px;
}

.button {
    display: block;
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    background: transparent;
    text-decoration: none;
    color: #7dd3fc;
    border: 2px solid #2a6f78;
    font-size: 16px;
    font-weight: bold;
    transition: all .2s ease;
    box-sizing: border-box;
    font-family: inherit;
    cursor: pointer;
    appearance: none;
}

.button:hover {
    background: #003840;
    color: #ffffff;
}

.footer {
    margin-top: 18px;
    color: #666666;
    font-size: 12px;
    letter-spacing: 1px;
}

@media (max-width: 600px) {
    .wrap {
        align-items: center;
        padding: 14px;
    }

    .logo {
        font-size: 38px;
    }
}
</style>
</head>

<body>

<div class="wrap">
    <div class="card">

        <div class="createdby">Created by:</div>

        <div class="logo">Paul Hodara</div>

        <div class="tagline">
            Making tools, art, and technology that connect people
        </div>

        <a class="button" href="https://www.vidiotbox.net" target="_blank">
            Vidiotbox
        </a>

        <a class="button" href="https://www.instagram.com/phodara" target="_blank">
            Instagram
        </a>

        <a class="button" href="https://www.paulhodara.com" target="_blank">
            Photography Portfolio
        </a>

        <a class="button" href="https://www.thelivingmuseum.org" target="_blank">
            The Living Museum
        </a>

        <a class="button" href="https://github.com/phodara" target="_blank">
            GitHub Projects
        </a>

        <button class="button" id="emailButton" type="button">
            Email
        </button>

        <div class="footer">
            TOTALLY USELESS DIGITAL ART
        </div>

    </div>
</div>

<script>
document.getElementById('emailButton').addEventListener('click', function () {
    const user = ['p', 'h', 'o', 'd', 'a', 'r', 'a'].join('');
    const host = ['g', 'm', 'a', 'i', 'l'].join('') + '.' + ['c', 'o', 'm'].join('');
    window.location.href = 'mailto:' + user + '@' + host;
});
</script>

</body>
</html>
