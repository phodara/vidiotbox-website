<script>
// ── Scale & canvas setup ──────────────────────────────────────
const SCALE = 1.5;
const SCREEN_W = 240;
const SCREEN_H = 320;

const mainCanvas = document.getElementById('screen');
mainCanvas.width  = SCREEN_W * SCALE;
mainCanvas.height = SCREEN_H * SCALE;

// ── RGB565 colour helpers ─────────────────────────────────────
function rgb565(c) {
  const r = ((c >> 11) & 0x1F) * 255 / 31;
  const g = ((c >>  5) & 0x3F) * 255 / 63;
  const b = ( c        & 0x1F) * 255 / 31;
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
}

const C_BG           = rgb565(0x0000);
const C_FACE_FG      = rgb565(0xFFFF);
const C_FACE_DIM     = rgb565(0xC618);
const C_PUPIL        = rgb565(0x001F);
const C_TONGUE       = rgb565(0xF800);
const C_TONGUE_DIM   = rgb565(0xB000);
const C_ACCENT_Y     = rgb565(0xFFE0);
const C_ACCENT_Y_DIM = rgb565(0xBDA0);
const C_NOSE         = rgb565(0xF800);
const C_EAR          = rgb565(0xFFFF);
const C_EAR_SHADE    = rgb565(0xC618);

// ── Geometry ──────────────────────────────────────────────────
const EL_X=74,  EL_Y=140, EL_W=34, EL_H=38;
const ER_X=132, ER_Y=140, ER_W=34, ER_H=38;
const EYE_OX=2, EYE_OY=14, EYE_W=30, EYE_H=18, EYE_R=9;
const IRIS_W=18, IRIS_H=12, PUP_W=6;
const MX=92, MY=195, MW=56, MH=64;
const HX=86, HY=54,  HW=72, HH=82;
const LEAR_X=51, LEAR_Y=145, LEAR_W=18, LEAR_H=48;
const REAR_X=171,REAR_Y=145, REAR_W=18, REAR_H=48;
const NX=114, NY=183, NW=12, NH=6;

// ── Expressions ───────────────────────────────────────────────
const EXPR = { NEUTRAL:0,HAPPY:1,ANGRY:2,SURPRISED:3,ANXIETY:4,WACKY:5,LISTENING:6,SLEEPING:7,SAD:8,WACKY3D:9,LOVING:10,SCARY:11,DIZZY:12 };
const EXPR_NAMES = ['NEUTRAL','HAPPY','ANGRY','SURPRISED','ANXIETY','WACKY','LISTENING','SLEEPING','SAD','WACKY3D','LOVING','SCARY','DIZZY'];

// ── State ─────────────────────────────────────────────────────
let curExpr = EXPR.NEUTRAL;
let eyeOpen = true;
let eyeScanX = 0, eyeScanY = 0, eyeFrame = 0;
let earDeploy = 0.0, micAmp = 0.0;

const EYE_SCAN_X = [0,1,1,2,3,4,4,5,6,5,4,4,3,2,1,1,0,-1,-1,-2,-3,-4,-4,-5,-6,-5,-4,-4,-3,-2,-1,-1];
const EYE_SCAN_Y = [-1,-1,-2,-2,-3,-3,-3,-2,-2,-1,0,1,2,2,3,3,3,2,2,1,0,-1,-2,-2,-3,-3,-2,-2,-1,-1,0,1];

let mouthShapeCur=0, mouthShapeNext=1;
let mouthShapeStart=0, mouthShapeHoldUntil=2000;
let tongueOut=false, tongueUntil=0;
let sadMouthStart=0, sadWasSad=false;
let nextBlinkTime=3000, blinkEndTime=0;
let zzzX=SCREEN_W, prevExprForZzz=-1;
let w3RotX=0.3, w3RotY=0, w3AutoSpin=true, w3SweepStart=0, w3Drag=false, w3DragLast={x:0,y:0};
let w3PupilShift=0;
const W3_SWEEP_MAX = 20 * Math.PI / 180;
const W3_SWEEP_PERIOD = 4000;

const startTime = Date.now();
function millis() { return Date.now() - startTime; }

const expressionAudio = {
  [EXPR.HAPPY]: new Audio('assets/audio/happy.mp3'),
  [EXPR.ANGRY]: new Audio('assets/audio/angry.mp3'),
  [EXPR.SURPRISED]: new Audio('assets/audio/surprise.mp3'),
  [EXPR.ANXIETY]: new Audio('assets/audio/Anxiety.mp3'),
  [EXPR.WACKY]: new Audio('assets/audio/whacky.mp3'),
  [EXPR.LISTENING]: new Audio('assets/audio/listening.mp3'),
  [EXPR.SLEEPING]: new Audio('assets/audio/sleep.mp3'),
  [EXPR.SAD]: new Audio('assets/audio/sad.mp3'),
  [EXPR.WACKY3D]: new Audio('assets/audio/whacky3d.mp3'),
  [EXPR.LOVING]: new Audio('assets/audio/kiss1.mp3'),
  [EXPR.SCARY]: new Audio('assets/audio/scary1.mp3')
};
Object.values(expressionAudio).forEach(audio => {
  audio.preload = 'auto';
});
expressionAudio[EXPR.LISTENING].loop = true;

function stopExpressionAudio() {
  Object.values(expressionAudio).forEach(audio => {
    audio.pause();
    audio.currentTime = 0;
  });
}

const touchPoints = document.querySelectorAll('.touch-point');
function setExpression(expr) {
  if(expr===EXPR.WACKY3D){
    w3RotY=0;
    w3SweepStart=millis();
    w3AutoSpin=true;
  }
  stopExpressionAudio();
  if(expressionAudio[expr]){
    expressionAudio[expr].play().catch(() => {});
  }
  curExpr=expr;
  touchPoints.forEach(point => {
    point.dataset.active = point.dataset.expr === EXPR_NAMES[curExpr] ? 'true' : 'false';
  });
}

touchPoints.forEach(point => {
  point.addEventListener('pointerdown', e => {
    e.preventDefault();
    setExpression(EXPR[point.dataset.expr]);
  });
  point.addEventListener('click', e => {
    if(e.detail===0) setExpression(EXPR[point.dataset.expr]);
  });
});
setExpression(curExpr);

// ── Off-screen canvases ───────────────────────────────────────
function makeCtx(w,h) { const c=document.createElement('canvas'); c.width=w; c.height=h; return c.getContext('2d'); }
const hairCtx  = makeCtx(HW,   HH);
const lEarCtx  = makeCtx(LEAR_W, LEAR_H);
const rEarCtx  = makeCtx(REAR_W, REAR_H);
const lEyeCtx  = makeCtx(EL_W,  EL_H);
const rEyeCtx  = makeCtx(ER_W,  ER_H);
const mouthCtx = makeCtx(MW,   MH);

// ── GFX primitives ────────────────────────────────────────────
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));

function fillScreen(c,col)           { c.fillStyle=col; c.fillRect(0,0,c.canvas.width,c.canvas.height); }
function fillRect(c,x,y,w,h,col)     { c.fillStyle=col; c.fillRect(x,y,w,h); }
function fillCircle(c,cx,cy,r,col)   { c.fillStyle=col; c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fill(); }
function drawCircle(c,cx,cy,r,col)   { c.strokeStyle=col; c.lineWidth=1; c.beginPath(); c.arc(cx+.5,cy+.5,r,0,Math.PI*2); c.stroke(); }
function drawLine(c,x0,y0,x1,y1,col) { c.strokeStyle=col; c.lineWidth=1; c.beginPath(); c.moveTo(x0+.5,y0+.5); c.lineTo(x1+.5,y1+.5); c.stroke(); }
function drawHLine(c,x,y,w,col)      { drawLine(c,x,y,x+w-1,y,col); }
function drawVLine(c,x,y,h,col)      { drawLine(c,x,y,x,y+h-1,col); }
function drawPixel(c,x,y,col)        { c.fillStyle=col; c.fillRect(x,y,1,1); }

function fillRoundRect(c,x,y,w,h,r,col) {
  c.fillStyle=col; c.beginPath(); c.roundRect(x,y,w,h,r); c.fill();
}
function fillTriangle(c,x0,y0,x1,y1,x2,y2,col) {
  c.fillStyle=col; c.beginPath(); c.moveTo(x0,y0); c.lineTo(x1,y1); c.lineTo(x2,y2); c.closePath(); c.fill();
}
function fillHCapsule(c,x,y,w,h,col) {
  const r=Math.floor(h/2);
  if(w<=h){ fillRoundRect(c,x,y,w,h,Math.floor(w/2),col); return; }
  fillRect(c,x+r,y,w-2*r,h,col);
  fillCircle(c,x+r,y+r,r,col);
  fillCircle(c,x+w-r-1,y+r,r,col);
}
function fillVCapsule(c,x,y,w,h,col) {
  const r=Math.floor(w/2);
  if(h<=w){ fillRoundRect(c,x,y,w,h,Math.floor(h/2),col); return; }
  fillRect(c,x,y+r,w,h-2*r,col);
  fillCircle(c,x+r,y+r,r,col);
  fillCircle(c,x+r,y+h-r-1,r,col);
}
function drawVCapsuleOutline(c,x,y,w,h,col) {
  const r=Math.floor(w/2);
  drawVLine(c,x,    y+r,h-2*r,col); drawVLine(c,x+w-1,y+r,h-2*r,col);
  drawCircle(c,x+r,y+r,r,col); drawCircle(c,x+r,y+h-r-1,r,col);
}

function drawQuadStroke(c,x0,y0,x1,y1,x2,y2,col,thick) {
  thick=thick||1;
  let px=x0,py=y0;
  for(let i=1;i<=18;i++){
    const t=i/18, inv=1-t;
    const x=inv*inv*x0+2*inv*t*x1+t*t*x2;
    const y=inv*inv*y0+2*inv*t*y1+t*t*y2;
    drawLine(c,Math.round(px),Math.round(py),Math.round(x),Math.round(y),col);
    if(thick>1) drawLine(c,Math.round(px)+1,Math.round(py),Math.round(x)+1,Math.round(y),col);
    px=x; py=y;
  }
}

function drawBrow(c,x0,x1,baseY,tilt,col) {
  let px=x0, py=baseY+tilt;
  for(let i=1;i<=6;i++){
    const t=i/6;
    const x=Math.round(x0+(x1-x0)*t);
    const arch=Math.sin(t*Math.PI)*4;
    const y=Math.round(baseY-arch+tilt*(1-2*t));
    drawLine(c,px,py,  x,y,  col);
    drawLine(c,px,py+1,x,y+1,col);
    px=x; py=y;
  }
}

function heartPoints(cx,cy,size){
  const w=size;
  const h=Math.round(size*0.92);
  return [
    [cx, cy+h],
    [cx-w, cy+1],
    [cx-w, cy-h+2],
    [cx-Math.round(w*0.42), cy-h],
    [cx, cy-Math.round(h*0.35)],
    [cx+Math.round(w*0.42), cy-h],
    [cx+w, cy-h+2],
    [cx+w, cy+1]
  ];
}

function fillHeart(c,cx,cy,size,col) {
  const pts=heartPoints(cx,cy,size);
  c.fillStyle=col;
  c.beginPath();
  c.moveTo(pts[0][0],pts[0][1]);
  c.lineTo(pts[1][0],pts[1][1]);
  c.quadraticCurveTo(pts[2][0],pts[2][1],pts[4][0],pts[4][1]);
  c.quadraticCurveTo(pts[6][0],pts[6][1],pts[7][0],pts[7][1]);
  c.closePath();
  c.fill();
}

function drawHeart(c,cx,cy,size,col,lineWidth) {
  const pts=heartPoints(cx,cy,size);
  c.strokeStyle=col;
  c.lineWidth=lineWidth || 1;
  c.beginPath();
  c.moveTo(pts[0][0],pts[0][1]);
  c.lineTo(pts[1][0],pts[1][1]);
  c.quadraticCurveTo(pts[2][0],pts[2][1],pts[4][0],pts[4][1]);
  c.quadraticCurveTo(pts[6][0],pts[6][1],pts[7][0],pts[7][1]);
  c.closePath();
  c.stroke();
}

function drawNose(ctx) {
  const cx=(NX+Math.floor(NW/2))*SCALE;
  const topY=(NY-3)*SCALE;
  const bridgeW=5*SCALE;
  const bulbW=16*SCALE;
  const bulbH=12*SCALE;
  const bulbY=(NY+5)*SCALE;
  const bottomY=bulbY+bulbH;

  ctx.fillStyle=C_NOSE;
  ctx.beginPath();
  ctx.moveTo(cx, topY);
  ctx.bezierCurveTo(cx+bridgeW, topY+3*SCALE, cx+bulbW/2, bulbY, cx+bulbW/2, bulbY+bulbH*0.45);
  ctx.bezierCurveTo(cx+bulbW/2, bottomY, cx+3*SCALE, bottomY+3*SCALE, cx, bottomY+3*SCALE);
  ctx.bezierCurveTo(cx-3*SCALE, bottomY+3*SCALE, cx-bulbW/2, bottomY, cx-bulbW/2, bulbY+bulbH*0.45);
  ctx.bezierCurveTo(cx-bulbW/2, bulbY, cx-bridgeW, topY+3*SCALE, cx, topY);
  ctx.fill();

  ctx.strokeStyle=C_TONGUE_DIM;
  ctx.lineWidth=SCALE;
  ctx.beginPath();
  ctx.moveTo(cx+4*SCALE, bulbY+bulbH*0.55);
  ctx.quadraticCurveTo(cx+6*SCALE, bulbY+bulbH*0.9, cx+1*SCALE, bottomY+1*SCALE);
  ctx.stroke();
  fillCircle(ctx,cx-4*SCALE,bottomY,1.4*SCALE,C_TONGUE_DIM);
  fillCircle(ctx,cx+4*SCALE,bottomY,1.4*SCALE,C_TONGUE_DIM);
}

function drawScaryFaceMarks(ctx, now) {
  const flicker=(Math.sin(now*0.02)+1)*0.5;
  ctx.save();
  ctx.lineWidth=SCALE;
  ctx.strokeStyle=C_TONGUE_DIM;
  ctx.beginPath();
  ctx.moveTo(83*SCALE,171*SCALE);
  ctx.lineTo(74*SCALE,184*SCALE);
  ctx.lineTo(80*SCALE,184*SCALE);
  ctx.lineTo(70*SCALE,198*SCALE);
  ctx.moveTo(157*SCALE,171*SCALE);
  ctx.lineTo(166*SCALE,184*SCALE);
  ctx.lineTo(160*SCALE,184*SCALE);
  ctx.lineTo(170*SCALE,198*SCALE);
  ctx.stroke();

  ctx.strokeStyle=flicker>0.45?C_TONGUE:C_ACCENT_Y_DIM;
  ctx.beginPath();
  ctx.moveTo(99*SCALE,212*SCALE);
  ctx.lineTo(92*SCALE,225*SCALE);
  ctx.moveTo(141*SCALE,212*SCALE);
  ctx.lineTo(148*SCALE,225*SCALE);
  ctx.stroke();
  ctx.restore();
}

function drawDizzyStars(ctx, now) {
  const cx=120, cy=104;
  const phase=now*0.0038;
  const stars=[
    { a:0.1, r:48, s:5 },
    { a:2.1, r:42, s:4 },
    { a:4.0, r:50, s:5 }
  ];
  ctx.save();
  ctx.lineWidth=SCALE;
  for(const star of stars){
    const wobble=Math.sin(phase*2+star.a)*4;
    const x=(cx+Math.cos(phase+star.a)*(star.r+wobble))*SCALE;
    const y=(cy+Math.sin(phase+star.a)*15+Math.cos(phase*1.3+star.a)*8)*SCALE;
    const s=star.s*SCALE;
    ctx.strokeStyle=C_ACCENT_Y;
    ctx.beginPath();
    ctx.moveTo(x-s,y);
    ctx.lineTo(x+s,y);
    ctx.moveTo(x,y-s);
    ctx.lineTo(x,y+s);
    ctx.stroke();
    ctx.strokeStyle=C_FACE_DIM;
    ctx.beginPath();
    ctx.moveTo(x-s*0.55,y-s*0.55);
    ctx.lineTo(x+s*0.55,y+s*0.55);
    ctx.moveTo(x+s*0.55,y-s*0.55);
    ctx.lineTo(x-s*0.55,y+s*0.55);
    ctx.stroke();
  }
  ctx.restore();
}

// Push off-screen ctx to scaled main canvas at (x,y)
function push(mainCtx, x, y, offCtx) {
  mainCtx.drawImage(offCtx.canvas, x*SCALE, y*SCALE, offCtx.canvas.width*SCALE, offCtx.canvas.height*SCALE);
}

function pushRotated(mainCtx, x, y, offCtx, degrees) {
  const w=offCtx.canvas.width*SCALE, h=offCtx.canvas.height*SCALE;
  const cx=x*SCALE+w/2, cy=y*SCALE+h/2;
  mainCtx.save();
  mainCtx.translate(cx, cy);
  mainCtx.rotate(degrees*Math.PI/180);
  mainCtx.drawImage(offCtx.canvas, -w/2, -h/2, w, h);
  mainCtx.restore();
}

// ── Hair ──────────────────────────────────────────────────────
function drawHair(mainCtx, expr, now) {
  const c=hairCtx; fillScreen(c,C_BG);
  if(expr===EXPR.ANXIETY){
    const tp=now*0.0105;
    for(let s=0;s<7;s++){
      const spread=s-3;
      const bx=Math.round(HW/2+spread*7.5), by=HH-2;
      let px=bx,py=by;
      for(let i=1;i<=11;i++){
        const t=i/11, jitter=Math.sin(tp*1.8+s*0.9+i*0.75);
        let x=clamp(bx+Math.round(spread*t*4+jitter*(1+t*2)),1,HW-2);
        let y=clamp(by-Math.round(t*70)-Math.round(Math.abs(jitter)*3),0,HH-1);
        drawLine(c,px,py,x,y,C_ACCENT_Y);
        if(i>6) drawLine(c,px+1,py,x+1,y,C_ACCENT_Y_DIM);
        px=x; py=y;
      }
      c.fillStyle='#FFF'; c.fillRect(px,Math.max(0,py-3),1,Math.min(5,HH-Math.max(0,py-3)));
    }
  } else if(expr===EXPR.SCARY){
    const pulse=(Math.sin(now*0.012)+1)*0.5;
    for(let s=0;s<9;s++){
      const bx=5+s*8;
      const lean=Math.sin(now*0.006+s*1.7)*2.6;
      const spikeH=38+(s%3)*8+pulse*10;
      const tipX=clamp(Math.round(bx+lean+(s-4)*1.6),1,HW-2);
      const tipY=clamp(Math.round(HH-spikeH),0,HH-2);
      fillTriangle(c,bx-5,HH-1,tipX,tipY,bx+5,HH-1,C_ACCENT_Y);
      drawLine(c,bx-2,HH-3,tipX,tipY,C_FACE_FG);
      drawLine(c,bx+2,HH-4,tipX,tipY,C_ACCENT_Y_DIM);
    }
  } else if(expr===EXPR.DIZZY){
    const spin=now*0.008;
    for(let s=0;s<6;s++){
      const bx=8+s*11;
      const lean=Math.sin(spin+s*1.2)*7;
      const curl=Math.cos(spin*0.8+s)*5;
      const tipX=clamp(Math.round(bx+lean+curl),1,HW-2);
      const tipY=clamp(Math.round(8+Math.abs(Math.sin(spin+s))*10),0,HH-8);
      drawQuadStroke(c,bx,HH-3,bx+lean*0.35,42,tipX,tipY,C_ACCENT_Y,2);
      fillCircle(c,tipX,tipY,2,C_FACE_FG);
      drawLine(c,tipX-3,tipY+3,tipX+3,tipY-3,C_ACCENT_Y_DIM);
    }
  } else {
    const tp=now*0.0035;
    for(let s=0;s<5;s++){
      const bx=6+s*14; let px=bx,py=4;
      for(let i=1;i<=18;i++){
        const y=4+i*4, taper=i/18;
        const x=bx+Math.round(Math.sin(tp+i*0.55+s*0.7)*(1.5+taper*2));
        drawLine(c,px,py,x,y,C_ACCENT_Y); px=x; py=y;
      }
    }
  }
  push(mainCtx,HX,HY,c);
}

function drawEar(mainCtx,rx,ry,isRight,deploy,amp){
  const c=isRight?rEarCtx:lEarCtx;
  fillScreen(c,C_BG);
  if(deploy<=0.02){ push(mainCtx,rx,ry,c); return; }
  const now=millis();
  const hardwarePulse=1+0.10*Math.sin(now*0.0035);
  const pulse=1+(hardwarePulse-1)*deploy;
  const centerX=isRight?6:12, centerY=22;
  const sx=(x)=>centerX+(x-centerX)*pulse;
  const sy=(y)=>centerY+(y-centerY)*pulse;
  if(isRight){
    drawQuadStroke(c,sx(6), sy(38), sx(12), sy(30), sx(12), sy(21), C_EAR,2);
    drawQuadStroke(c,sx(12),sy(21), sx(12), sy(8),  sx(5),  sy(7),  C_EAR,2);
    drawQuadStroke(c,sx(5), sy(7),  sx(0),  sy(7),  sx(-1), sy(15), C_EAR,2);
  } else {
    drawQuadStroke(c,sx(12),sy(38), sx(6),  sy(30), sx(6),  sy(21), C_EAR,2);
    drawQuadStroke(c,sx(6), sy(21), sx(6),  sy(8),  sx(13), sy(7),  C_EAR,2);
    drawQuadStroke(c,sx(13),sy(7),  sx(18), sy(7),  sx(19), sy(15), C_EAR,2);
  }
  push(mainCtx,rx,ry+3,c);
}

// ── Spiral eye (ANXIETY) ──────────────────────────────────────
function drawSpiralEye(c,ex,ey,scan,vscan,isLeft){
  const phase0=(millis()%1600)*(Math.PI*2/1600);
  const phase=isLeft?phase0:-phase0;
  const cx=ex+EYE_W/2+scan*0.35, cy=ey+EYE_H/2+vscan*0.25;
  const maxR=Math.min(EYE_W,EYE_H)*0.86;
  let px=cx,py=cy;
  for(let i=1;i<=36;i++){
    const t=i/36, angle=phase+t*8.4*Math.PI, r=maxR*t;
    const x=clamp(Math.round(cx+Math.cos(angle)*r),      ex,ex+EYE_W-1);
    const y=clamp(Math.round(cy+Math.sin(angle)*r*0.82), ey,ey+EYE_H-1);
    drawLine(c,Math.round(px),Math.round(py),x,y,C_FACE_FG);
    if(i%5===0) drawPixel(c,x,y,C_FACE_DIM);
    px=x; py=y;
  }
  fillCircle(c,Math.round(cx),Math.round(cy),4,C_PUPIL);
  drawCircle(c,Math.round(cx),Math.round(cy),7,C_FACE_DIM);
}

function drawDizzyEye(c,ex,ey,scan,vscan,isLeft){
  const phase0=(millis()%1300)*(Math.PI*2/1300);
  const phase=isLeft?phase0:-phase0+Math.PI*0.35;
  const bob=Math.sin(phase0+(isLeft?0:Math.PI))*2.3;
  const cx=ex+EYE_W/2+scan*0.2+(isLeft?-1:1);
  const cy=ey+EYE_H/2+vscan*0.15+bob;
  const maxR=Math.min(EYE_W,EYE_H)*0.72;
  fillCircle(c,Math.round(cx),Math.round(cy),10,C_FACE_FG);
  fillCircle(c,Math.round(cx),Math.round(cy),8,C_BG);
  let px=cx, py=cy;
  for(let i=1;i<=32;i++){
    const t=i/32;
    const angle=phase+t*7.6*Math.PI;
    const r=maxR*t;
    const x=clamp(Math.round(cx+Math.cos(angle)*r),ex+2,ex+EYE_W-3);
    const y=clamp(Math.round(cy+Math.sin(angle)*r*0.78),ey+2,ey+EYE_H-3);
    drawLine(c,Math.round(px),Math.round(py),x,y,C_FACE_FG);
    px=x; py=y;
  }
  fillCircle(c,Math.round(cx),Math.round(cy),2,C_ACCENT_Y);
  drawCircle(c,Math.round(cx),Math.round(cy),11,C_FACE_DIM);
}

// ── Eye region ────────────────────────────────────────────────
function drawEye(mainCtx,rx,ry,expr,open,scan,vscan,isLeft){
  const c=isLeft?lEyeCtx:rEyeCtx;
  fillScreen(c,C_BG);
  const ex=EYE_OX, ey=EYE_OY;

  // Brow
  const browY=5+vscan;
  let bx0=clamp(ex+scan,0,EL_W-EYE_W), bx1=bx0+EYE_W;
  switch(expr){
    case EXPR.ANGRY:    drawBrow(c,bx0,  bx1,  browY,   isLeft?-8:8, C_ACCENT_Y); break;
    case EXPR.SURPRISED:drawBrow(c,bx0+2,bx1-2,browY-1, 0,           C_ACCENT_Y); break;
    case EXPR.ANXIETY:  drawBrow(c,bx0+3,bx1-3,browY-2+(isLeft?1:-1),isLeft?5:-5,C_ACCENT_Y); break;
    case EXPR.WACKY:    drawBrow(c,bx0+4,bx1-4,browY+(isLeft?5:1),  0,           C_ACCENT_Y_DIM); break;
    case EXPR.SAD:      drawBrow(c,bx0,  bx1,  browY,   isLeft?7:-7, C_ACCENT_Y_DIM); break;
    case EXPR.LOVING:   drawBrow(c,bx0+5,bx1-5,browY+2, 0,           C_ACCENT_Y_DIM); break;
    case EXPR.DIZZY:    drawBrow(c,bx0+3,bx1-4,browY+(isLeft?4:-1), isLeft?-3:4, C_ACCENT_Y_DIM); break;
    case EXPR.SCARY:
      drawLine(c,bx0-1,browY+(isLeft?-4:7),bx1+1,browY+(isLeft?7:-4),C_ACCENT_Y);
      drawLine(c,bx0-1,browY+(isLeft?-3:8),bx1+1,browY+(isLeft?8:-3),C_ACCENT_Y);
      drawLine(c,bx0+5,browY+1,bx0+11,browY+(isLeft?7:-4),C_TONGUE);
      break;
    default:            drawBrow(c,bx0+4,bx1-4,browY+1, 0,           C_ACCENT_Y_DIM); break;
  }

  // Socket
  fillRoundRect(c,ex,ey,EYE_W,EYE_H,EYE_R,C_BG);

  // Blink
  if(!open){
    const cy=ey+Math.floor(EYE_H/2);
    fillHCapsule(c,ex+4,cy-1,EYE_W-8,4,C_FACE_FG);
    drawHLine(c,ex+6,cy+1,EYE_W-12,C_FACE_DIM);
    push(mainCtx,rx,ry,c); return;
  }

  // Happy squint
  if(expr===EXPR.HAPPY){
    fillHCapsule(c,ex+3,ey+Math.floor(EYE_H/2)-1,EYE_W-6,7,C_FACE_FG);
    fillCircle(c,ex+Math.floor(EYE_W/2),ey+Math.floor(EYE_H/2)+1,5,C_FACE_FG);
    fillCircle(c,ex+Math.floor(EYE_W/2),ey+Math.floor(EYE_H/2)-5,7,C_BG);
    push(mainCtx,rx,ry,c); return;
  }

  // Surprised: large iris
  if(expr===EXPR.SURPRISED){
    const r=Math.floor(Math.min(EYE_W,EYE_H)/2)-4;
    const icy=clamp(ey+Math.floor(EYE_H/2)+vscan,ey+r+1,ey+EYE_H-r-1);
    fillCircle(c,ex+Math.floor(EYE_W/2),icy,r,C_FACE_FG);
    fillCircle(c,ex+Math.floor(EYE_W/2)+Math.floor(scan/3),icy,Math.floor(PUP_W/2),C_PUPIL);
    fillCircle(c,ex+Math.floor(EYE_W/2)-3,icy-3,2,C_FACE_DIM);
    push(mainCtx,rx,ry,c); return;
  }

  // Sleeping
  if(expr===EXPR.SLEEPING){
    drawHLine(c,ex+4,ey+Math.floor(EYE_H/2),EYE_W-8,C_FACE_FG);
    push(mainCtx,rx,ry,c); return;
  }

  if(expr===EXPR.LOVING){
    const hx=ex+Math.floor(EYE_W/2);
    const hy=ey+Math.floor(EYE_H/2)+2;
    fillHeart(c,hx,hy,8,C_BG);
    drawHeart(c,hx,hy,8,C_NOSE,2);
    push(mainCtx,rx,ry,c); return;
  }

  if(expr===EXPR.SCARY){
    const ph=millis()*0.018+(isLeft?0:Math.PI);
    const glow=Math.sin(ph)*0.8;
    const cx=ex+Math.floor(EYE_W/2)+Math.round(scan*0.25);
    const cy=ey+Math.floor(EYE_H/2)+Math.round(vscan*0.25);
    fillCircle(c,cx,cy,10,C_FACE_FG);
    fillCircle(c,cx,cy,7,C_BG);
    fillVCapsule(c,cx-2,cy-8+Math.round(glow),5,17,C_TONGUE);
    fillVCapsule(c,cx-1,cy-5,3,11,C_PUPIL);
    drawCircle(c,cx,cy,11,C_ACCENT_Y);
    drawLine(c,ex+1,ey+2,ex+8,ey+7,C_FACE_DIM);
    drawLine(c,ex+EYE_W-2,ey+2,ex+EYE_W-9,ey+7,C_FACE_DIM);
    push(mainCtx,rx,ry,c); return;
  }

  if(expr===EXPR.DIZZY){
    drawDizzyEye(c,ex,ey,scan,vscan,isLeft);
    push(mainCtx,rx,ry,c); return;
  }

  // Anxiety spiral
  if(expr===EXPR.ANXIETY){
    drawSpiralEye(c,ex,ey,scan,vscan,isLeft);
    push(mainCtx,rx,ry,c); return;
  }

  // Standard iris + pupil
  let is=scan, iv=vscan;
  if(expr===EXPR.WACKY){
    const ph=(millis()%2200)*(Math.PI*2/2200);
    is+=(isLeft?-2:2)+(isLeft?1:-1)*Math.round(Math.sin(ph)*4.8);
    iv+=2+(isLeft?1:-1)*Math.round(Math.cos(ph)*3.6);
  }
  if(expr===EXPR.SAD) iv+=3;

  let iw=IRIS_W, ih=IRIS_H, pw=PUP_W;
  if(expr===EXPR.ANGRY){ iw=Math.floor(iw*1.4); ih=Math.floor(ih*1.4); pw=Math.floor(pw*1.4); }
  if(expr===EXPR.WACKY){ iw=Math.floor(iw*1.2); ih=Math.floor(ih*1.2); pw=Math.floor(pw*1.2); }

  let ix=clamp(ex+Math.floor((EYE_W-iw)/2)+is, ex+2, ex+EYE_W-iw-2);
  let iy=clamp(ey+Math.floor((EYE_H-ih)/2)+iv+(expr===EXPR.WACKY?4:0), ey+2, ey+EYE_H-ih-2);

  fillRoundRect(c,ix,iy,iw,ih,Math.floor(ih/2),C_FACE_FG);

  if(expr===EXPR.ANGRY)  for(let d=0;d<5;d++) drawLine(c,ix,iy+d,ix+d,iy,C_BG);
  if(expr===EXPR.WACKY)  for(let d=0;d<4;d++) drawHLine(c,ix+IRIS_W-d,iy+d,d,C_BG);

  let px=ix+Math.floor(iw/2), py=iy+Math.floor(ih/2);
  if(expr===EXPR.WACKY){
    const ph=(millis()%2200)*(Math.PI*2/2200);
    const pp=isLeft?ph:-ph;
    px+=Math.round(Math.cos(pp)*6); py+=Math.round(Math.sin(pp)*3.6);
    if(w3PupilShift!==0){
      const bob=(millis()%900)*(Math.PI*2/900);
      const turnAmt=Math.abs(w3PupilShift);
      px=ix+Math.floor(iw/2)+Math.round(w3PupilShift*iw*0.34);
      py=iy+Math.floor(ih/2)+Math.round(Math.sin(bob+(isLeft?0:Math.PI))*4*turnAmt);
    }
  }
  fillCircle(c,px,py,Math.floor(pw/2),C_PUPIL);
  fillCircle(c,ix+4,iy+3,1,C_FACE_DIM);
  drawHLine(c,ix+2,iy+IRIS_H-3,IRIS_W-4,C_FACE_DIM);

  push(mainCtx,rx,ry,c);
}

// ── Mouth shape sampler ───────────────────────────────────────
function sampleMouth(shape,t,amp){
  const skew=t-0.5;
  switch(shape){
    case 0: return { c: Math.sin((t-0.08)*Math.PI)*5.2+skew*1.6,    k: 10.5+3.5*Math.sin((t+0.08)*Math.PI) };
    case 1: return { c: -Math.sin((t+0.06)*Math.PI)*4.8-skew*2.2,   k: 2.8+0.7*(0.5-skew) };
    case 2: return { c: Math.sin((t+0.06)*Math.PI*2)*(2.4+amp*4)+Math.sin((t+0.18)*Math.PI*4)*0.9+skew*1.2, k: 2.8+0.7*Math.cos((t-0.12)*Math.PI) };
    default:return { c:0, k:3.5 };
  }
}

function drawForwardTongue(c, now, baseX, baseY) {
  const phase=now*0.002;
  const wave=Math.sin(phase);
  const tipX=baseX;
  const tipY=baseY+24+wave*4.2;
  const baseW=9, midW=15, tipW=23, tipH=12;

  c.fillStyle=C_TONGUE;
  c.beginPath();
  c.moveTo(baseX-baseW/2,baseY);
  c.bezierCurveTo(baseX-midW/2,baseY+8,tipX-tipW/2,tipY-9,tipX-tipW/2,tipY);
  c.bezierCurveTo(tipX-tipW/2,tipY+tipH/2,tipX-tipW*0.25,tipY+tipH,tipX,tipY+tipH);
  c.bezierCurveTo(tipX+tipW*0.25,tipY+tipH,tipX+tipW/2,tipY+tipH/2,tipX+tipW/2,tipY);
  c.bezierCurveTo(tipX+tipW/2,tipY-9,baseX+midW/2,baseY+8,baseX+baseW/2,baseY);
  c.closePath();
  c.fill();

  c.strokeStyle=C_TONGUE_DIM;
  c.lineWidth=1;
  c.beginPath();
  c.moveTo(baseX,baseY+3);
  c.bezierCurveTo(baseX,baseY+10+wave*1.5,tipX,tipY+1-wave*1.2,tipX,tipY+tipH-3);
  c.stroke();
  fillCircle(c,tipX-4,tipY+3,1,C_TONGUE_DIM);
}

function drawWackyTeethMouth(c) {
  const cx=MW/2, gapY=31;
  const toothW=4, toothH=8, step=7;
  for(let i=-3;i<=3;i++){
    const x=Math.round(cx+i*step-toothW/2);
    const smile=Math.abs(i)*2.2;
    fillRect(c,x,Math.round(gapY-8-smile),toothW,toothH,C_FACE_FG);
    fillRect(c,x,Math.round(gapY+6-smile),toothW,toothH,C_FACE_FG);
  }

  // Central black opening between upper/lower jaws; WACKY3D tongue roots here.
  fillRect(c,cx-12,gapY-2,24,9,C_BG);
  fillRect(c,cx-21,gapY-7,8,8,C_BG);
  fillRect(c,cx+13,gapY-7,8,8,C_BG);
}

function drawScaryMouth(c, now) {
  const cx=MW/2;
  const wobble=Math.sin(now*0.017);
  const snarl=Math.sin(now*0.009+1.1);
  const left=5, right=MW-5;
  const topY=18+Math.round(wobble*2);
  const botY=50+Math.round(snarl*2);

  c.fillStyle=C_FACE_FG;
  c.beginPath();
  c.moveTo(left, topY+7);
  c.quadraticCurveTo(cx, topY-12, right, topY+7);
  c.lineTo(right-3, botY-2);
  c.quadraticCurveTo(cx, botY+10, left+3, botY-2);
  c.closePath();
  c.fill();

  c.fillStyle=C_BG;
  c.beginPath();
  c.moveTo(left+6, topY+10);
  c.quadraticCurveTo(cx, topY-3, right-6, topY+10);
  c.lineTo(right-9, botY-8);
  c.quadraticCurveTo(cx, botY+3, left+9, botY-8);
  c.closePath();
  c.fill();

  for(let i=0;i<7;i++){
    const t=i/6;
    const x=left+7+t*(right-left-14);
    const h=9+(i%2)*5+(i===3?4:0);
    const y=topY+8+Math.sin(t*Math.PI)*-4;
    fillTriangle(c,Math.round(x-3),Math.round(y),Math.round(x+3),Math.round(y),Math.round(x+(i%2?1:-1)),Math.round(y+h),C_FACE_FG);
  }
  for(let i=0;i<6;i++){
    const t=i/5;
    const x=left+10+t*(right-left-20);
    const h=8+((i+1)%2)*5;
    const y=botY-8+Math.sin(t*Math.PI)*3;
    fillTriangle(c,Math.round(x-3),Math.round(y),Math.round(x+3),Math.round(y),Math.round(x+(i%2?-1:1)),Math.round(y-h),C_FACE_FG);
  }

  c.strokeStyle=C_TONGUE_DIM;
  c.lineWidth=1;
  c.beginPath();
  c.moveTo(cx-10,botY-13);
  c.bezierCurveTo(cx-3,botY-3,cx+5,botY-4,cx+11,botY-15);
  c.stroke();
  fillCircle(c,cx-17,topY+13,2,C_TONGUE);
  fillCircle(c,cx+18,topY+13,2,C_TONGUE);
}

function drawDizzyMouth(c, now, iX, iY, iW, iH, bY) {
  const phase=now*0.009;
  let px=iX, pt=bY, pb=bY;
  for(let i=0;i<=iW;i+=2){
    const t=i/iW;
    const wobble=Math.sin(t*Math.PI*3.4+phase)*4.4+Math.sin(t*Math.PI*8-phase*0.7)*1.3;
    const sag=Math.sin(t*Math.PI)*5.8;
    const x=iX+i;
    const mid=clamp(Math.round(bY+wobble+sag),iY,iY+iH);
    const thick=3+Math.sin(t*Math.PI)*2;
    const top=clamp(Math.round(mid-thick),iY,iY+iH);
    const bot=clamp(Math.round(mid+thick),iY,iY+iH);
    if(i>0){
      fillTriangle(c,px,pt,x,top,px,pb,C_FACE_FG);
      fillTriangle(c,x,top,x,bot,px,pb,C_FACE_FG);
      drawLine(c,px,Math.round((pt+pb)/2),x,mid,C_FACE_DIM);
    }
    px=x; pt=top; pb=bot;
  }
  fillCircle(c,MW/2-13,bY+7+Math.sin(phase)*2,2,C_BG);
  fillCircle(c,MW/2+14,bY+5-Math.sin(phase)*2,2,C_BG);
}

// ── Mouth region ──────────────────────────────────────────────
function drawMouth(mainCtx,expr,amp,opts={}){
  const c=mouthCtx; fillScreen(c,C_BG);
  const iX=2,iY=4,iW=MW-4,iH=MH-8,bY=iY+Math.floor(iH/2);
  const now=millis();

  let morph=1;
  if(mouthShapeHoldUntil>mouthShapeStart)
    morph=Math.max(0,Math.min(1,(now-mouthShapeStart)/(mouthShapeHoldUntil-mouthShapeStart)));
  morph=morph*morph*(3-2*morph); // easeInOut

  let rCur=mouthShapeCur, rNext=mouthShapeNext;
  if(expr===EXPR.HAPPY || expr===EXPR.LOVING){ rCur=0; rNext=0; morph=1; }

  fillRoundRect(c,0,0,MW,MH,Math.floor(MH/2),C_BG);

  // Surprised: O-mouth
  if(expr===EXPR.SURPRISED){
    const ow=24,oh=34,ox=Math.floor(MW/2)-12,oy=iY+10,ring=5;
    fillVCapsule(c,ox,oy,ow,oh,C_FACE_FG);
    drawVCapsuleOutline(c,ox,oy,ow,oh,C_FACE_DIM);
    fillVCapsule(c,ox+ring,oy+ring,ow-ring*2,oh-ring*2,C_BG);
    push(mainCtx,MX,MY,c); return;
  }

  // SAD
  if(expr===EXPR.SAD&&!sadWasSad){ sadMouthStart=now; sadWasSad=true; }
  if(expr!==EXPR.SAD) sadWasSad=false;
  if(expr===EXPR.SAD){
    const sp=(now-sadMouthStart)*(Math.PI/3000);
    const prog=(1-Math.cos(sp))*0.5;
    let px=iX,pt=bY,pb=bY;
    for(let i=0;i<=iW;i+=2){
      const t=i/iW, droop=(1-Math.sin(t*Math.PI))*9*prog;
      const x=iX+i;
      const top=clamp(Math.round(bY+droop-2),iY,iY+iH);
      const bot=clamp(Math.round(bY+droop+2),iY,iY+iH);
      if(i>0){ fillTriangle(c,px,pt,x,top,px,pb,C_FACE_FG); fillTriangle(c,x,top,x,bot,px,pb,C_FACE_FG); drawLine(c,px,pt,x,top,C_FACE_DIM); }
      px=x; pt=top; pb=bot;
    }
    push(mainCtx,MX,MY,c); return;
  }

  // SLEEPING
  if(expr===EXPR.SLEEPING){
    const tp=now*0.005; let px=iX,pt=bY,pb=bY;
    for(let i=0;i<=iW;i+=2){
      const t=i/iW;
      const center=Math.sin(t*25.13+tp)*2+Math.sin(t*25.13+tp+1.57)*1.5+Math.sin(t*25.13+tp+3.14)+Math.sin(t*25.13+tp+4.71)*0.5;
      const x=iX+i, top=clamp(Math.round(bY+center-3),iY,iY+iH), bot=clamp(Math.round(bY+center+3),iY,iY+iH);
      if(i>0){ fillTriangle(c,px,pt,x,top,px,pb,C_FACE_FG); fillTriangle(c,x,top,x,bot,px,pb,C_FACE_FG); drawLine(c,px,pt,x,top,C_FACE_DIM); }
      px=x; pt=top; pb=bot;
    }
    push(mainCtx,MX,MY,c); return;
  }

  // ANXIETY
  if(expr===EXPR.ANXIETY){
    const ph=now*0.0042; let px=iX,pm=bY,pt=bY-1,pb=bY+1;
    for(let i=0;i<=iW;i+=2){
      const t=i/iW, phase=t*5.5+ph;
      const wave=(phase-Math.floor(phase))*2-1;
      const chatter=Math.sin(t*25.13+ph*2.3)*1.5;
      const center=wave*8+chatter, thick=2.2+Math.abs(wave)*0.8;
      const x=iX+i;
      const mid=clamp(Math.round(bY+center),iY,iY+iH);
      const top=clamp(Math.round(mid-thick),iY,iY+iH);
      const bot=clamp(Math.round(mid+thick),iY,iY+iH);
      if(i>0){ fillTriangle(c,px,pt,x,top,px,pb,C_FACE_FG); fillTriangle(c,x,top,x,bot,px,pb,C_FACE_FG); drawLine(c,px,pm,x,mid,C_FACE_DIM); }
      px=x; pm=mid; pt=top; pb=bot;
    }
    push(mainCtx,MX,MY,c); return;
  }

  if(expr===EXPR.SCARY){
    drawScaryMouth(c, now);
    push(mainCtx,MX,MY,c); return;
  }

  if(expr===EXPR.DIZZY){
    drawDizzyMouth(c, now, iX, iY, iW, iH, bY);
    push(mainCtx,MX,MY,c); return;
  }

  if(expr===EXPR.LOVING){
    const kiss=Math.sin(now*0.0035);
    const cx=Math.floor(MW/2);
    const cy=bY+3-Math.round(kiss);
    const lipScale=1+kiss*0.06;
    const lipW=22*0.85*lipScale;
    const upperH=10*0.85*lipScale;
    const lowerH=12*0.85*lipScale;
    const tipInset=lipW*0.84;
    const topOuter=lipW*0.6;
    const topInner=lipW*0.3;
    const pout = (Math.sin(now*0.006)+1)*0.5;
    const partGap = (0.8 + pout*3.2) * 3;
    const centerPull = 0.5 + pout*1.6;

    c.fillStyle=C_NOSE;
    c.beginPath();
    c.moveTo(cx-lipW,cy);
    c.lineTo(cx-tipInset,cy-upperH*0.18);
    c.bezierCurveTo(cx-topOuter,cy-upperH*1.2,cx-topInner,cy-upperH*1.48,cx-1,cy-upperH*0.55);
    c.bezierCurveTo(cx+1,cy-upperH*0.55,cx+topInner,cy-upperH*1.48,cx+topOuter,cy-upperH*1.2);
    c.lineTo(cx+tipInset,cy-upperH*0.18);
    c.lineTo(cx+lipW,cy+0.1);
    c.bezierCurveTo(cx+lipW*0.82,cy+0.18,cx+lipW*0.28,cy+0.45+centerPull,cx,cy+0.4+centerPull);
    c.bezierCurveTo(cx-lipW*0.28,cy+0.45+centerPull,cx-lipW*0.82,cy+0.18,cx-lipW,cy+0.1);
    c.closePath();
    c.fill();

    c.beginPath();
    c.moveTo(cx-lipW,cy+0.9);
    c.lineTo(cx-lipW*0.86,cy+0.48);
    c.bezierCurveTo(cx-lipW*0.74,cy+lowerH*0.18,cx-lipW*0.42,cy+lowerH*1.18,cx-2,cy+lowerH*0.78);
    c.bezierCurveTo(cx+lipW*0.08,cy+lowerH*1.22,cx+lipW*0.46,cy+lowerH*0.92,cx+lipW*0.76,cy+0.38);
    c.lineTo(cx+lipW,cy-0.12);
    c.bezierCurveTo(cx+lipW*0.74,cy+0.12,cx+lipW*0.18,cy+0.9-centerPull*0.35,cx-1,cy+1.76-centerPull*0.5);
    c.bezierCurveTo(cx-lipW*0.36,cy+0.84-centerPull*0.25,cx-lipW*0.8,cy+0.22,cx-lipW,cy+0.9);
    c.closePath();
    c.fill();

    c.fillStyle=C_BG;
    c.beginPath();
    c.moveTo(cx-lipW*0.34,cy+0.92);
    c.bezierCurveTo(cx-lipW*0.22,cy+0.12,cx-lipW*0.1,cy-partGap*0.18,cx,cy-partGap*0.28);
    c.bezierCurveTo(cx+lipW*0.1,cy-partGap*0.18,cx+lipW*0.22,cy+0.12,cx+lipW*0.34,cy+0.92);
    c.bezierCurveTo(cx+lipW*0.23,cy+1.55+partGap*0.18,cx+lipW*0.11,cy+2.02+partGap*0.22,cx,cy+2.08+partGap*0.2);
    c.bezierCurveTo(cx-lipW*0.11,cy+2.02+partGap*0.22,cx-lipW*0.23,cy+1.55+partGap*0.18,cx-lipW*0.34,cy+0.92);
    c.closePath();
    c.fill();

    c.strokeStyle=C_BG;
    c.lineWidth=2;
    c.beginPath();
    c.moveTo(cx-lipW*0.94,cy+0.25);
    c.bezierCurveTo(cx-lipW*0.58,cy+1.55,cx-lipW*0.16,cy-1.15-partGap*0.15,cx+1,cy+1.5);
    c.bezierCurveTo(cx+lipW*0.18,cy+3.75+partGap*0.35,cx+lipW*0.54,cy+0.82,cx+lipW*0.94,cy-0.8);
    c.stroke();
    push(mainCtx,MX,MY,c); return;
  }

  // WACKY: toothy grin with a small central opening for the tongue.
  if(expr===EXPR.WACKY){
    drawWackyTeethMouth(c);
    if(!opts.skipTongue && tongueOut) drawForwardTongue(c, now, MW/2, iY+27);
    push(mainCtx,MX,MY,c); return;
  }

  // Standard morphing mouth
  const hpulse=(expr===EXPR.HAPPY)?(1+0.2*Math.sin(now*0.002)):1;
  const hcx=iX+iW*0.5;
  let px=iX,pt=bY,pb=bY;
  for(let i=0;i<=iW;i+=2){
    const t=i/iW;
    const a=sampleMouth(rCur,t,amp), b=sampleMouth(rNext,t,amp);
    let center=(a.c+(b.c-a.c)*morph);
    let thick  =(a.k+(b.k-a.k)*morph)*0.58;
    if(expr===EXPR.HAPPY){ const sb=Math.sin(t*Math.PI); center+=sb*5.2*hpulse; thick+=(1.8+sb*1.8)*hpulse; }
    if(expr===EXPR.ANGRY){ const aw=Math.sin((t-.5)*Math.PI)+0.4*Math.sin((t-.5)*Math.PI*2)+0.2*Math.sin((t-.5)*Math.PI*3); center=-aw*10*morph; thick=1; }
    if(expr===EXPR.LISTENING) thick+=amp*1.1;
    const x=(expr===EXPR.HAPPY)?clamp(Math.round(hcx+(iX+i-hcx)*hpulse),iX,iX+iW):iX+i;
    const top=clamp(Math.round(bY+center-thick),iY,iY+iH);
    const bot=clamp(Math.round(bY+center+thick),iY,iY+iH);
    if(i>0){ fillTriangle(c,px,pt,x,top,px,pb,C_FACE_FG); fillTriangle(c,x,top,x,bot,px,pb,C_FACE_FG); drawLine(c,px,pt,x,top,C_FACE_DIM); }
    px=x; pt=top; pb=bot;
  }

  // Happy tooth gaps
  if(expr===EXPR.HAPPY){
    for(const gT of [0.18,0.34,0.5,0.66,0.82]){
      const a=sampleMouth(rCur,gT,amp), b=sampleMouth(rNext,gT,amp);
      let center=(a.c+(b.c-a.c)*morph); let thick=(a.k+(b.k-a.k)*morph)*0.58;
      const sb=Math.sin(gT*Math.PI); center+=sb*5.2*hpulse; thick+=(1.8+sb*1.8)*hpulse;
      const gx=clamp(Math.round(hcx+(iX+gT*iW-hcx)*hpulse),iX,iX+iW);
      const top=clamp(Math.round(bY+center-thick)+2,iY,iY+iH);
      const bot=clamp(Math.round(bY+center+thick)-2,iY,iY+iH);
      if(bot>top){ drawVLine(c,gx,top,bot-top+1,C_BG); drawVLine(c,gx+1,top+1,Math.max(0,bot-top-1),C_BG); }
    }
  }

  // Tongue (WACKY, SURPRISED, SLEEPING, ANXIETY, SAD — not HAPPY/ANGRY/LISTENING/NEUTRAL)
  if(!opts.skipTongue && tongueOut && expr!==EXPR.HAPPY && expr!==EXPR.ANGRY && expr!==EXPR.LISTENING && expr!==EXPR.NEUTRAL && expr!==EXPR.SCARY){
    drawForwardTongue(c, now, MW/2, iY+27);
  }

  push(mainCtx,MX,MY,c);
}

// ── Full render ───────────────────────────────────────────────
// Draw all face elements to any same-sized ctx (no label)
function drawFaceToCtx(ctx, expr, opts={}) {
  const now=millis();
  ctx.fillStyle=C_BG; ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.height);
  drawHair(ctx,expr,now);
  drawEar(ctx,LEAR_X,LEAR_Y,false,earDeploy,micAmp);
  drawEar(ctx,REAR_X,REAR_Y,true, earDeploy,micAmp);
  if(!opts.skipNose) drawNose(ctx);
  drawEye(ctx,EL_X,EL_Y,expr,eyeOpen,-eyeScanX,-eyeScanY,true);
  drawEye(ctx,ER_X,ER_Y,expr,eyeOpen, eyeScanX, eyeScanY,false);
  if(expr===EXPR.SCARY) drawScaryFaceMarks(ctx, now);
  if(expr===EXPR.DIZZY) drawDizzyStars(ctx, now);
  drawMouth(ctx,expr,micAmp,opts);
  ctx.fillStyle=C_BG; ctx.fillRect(0,270*SCALE,SCREEN_W*SCALE,24*SCALE);
  if(expr===EXPR.SLEEPING){
    const textWidth=63;
    if(zzzX>0 && zzzX<SCREEN_W-textWidth){
      ctx.fillStyle='#FFF'; ctx.font=`bold ${20*SCALE}px monospace`;
      ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText('Zzz',zzzX*SCALE,270*SCALE);
    }
  }
}

function render(){
  const ctx=mainCanvas.getContext('2d');
  if(curExpr===EXPR.WACKY3D){
    drawWacky3DTexture(); // render small WACKY face as perspective texture
    renderPerspectiveFace(ctx);
    return;
  }
  drawFaceToCtx(ctx, curExpr);
}

// ── Update logic ──────────────────────────────────────────────
let frameN=0;
function update(){
  const now=millis();

  // Blink
  if(curExpr===EXPR.SCARY || curExpr===EXPR.DIZZY){
    eyeOpen=true;
    nextBlinkTime=now+500;
  } else {
    if(!eyeOpen && now>=blinkEndTime){ eyeOpen=true; nextBlinkTime=now+2500+Math.random()*3500; }
    if(eyeOpen  && now>=nextBlinkTime){ eyeOpen=false; blinkEndTime=now+100; }
  }

  // Mouth morph cycle (mirrors firmware logic)
  if(tongueOut && now>=tongueUntil){
    tongueOut=false;
    mouthShapeCur=0; // SMILE
    mouthShapeNext=(mouthShapeCur+1+Math.floor(Math.random()*2))%3;
    mouthShapeStart=now;
    mouthShapeHoldUntil=now+1400+Math.random()*1200;
  }
  if(!tongueOut && now>=mouthShapeHoldUntil){
    mouthShapeCur=mouthShapeNext;
    mouthShapeStart=now;
    if(mouthShapeCur===0){ // SMILE → tongue out
      tongueOut=true;
      tongueUntil=now+3000;
      mouthShapeNext=0;
      mouthShapeHoldUntil=tongueUntil;
    } else {
      const isWacky=curExpr===EXPR.WACKY||curExpr===EXPR.WACKY3D;
      mouthShapeNext=isWacky ? 0 : (mouthShapeCur+1+Math.floor(Math.random()*2))%3;
      mouthShapeHoldUntil=now+(isWacky ? 600+Math.random()*400 : 1400+Math.random()*1200);
    }
  }

  // Ear deploy (smooth)
  const target=curExpr===EXPR.LISTENING?1:0;
  earDeploy+=(target-earDeploy)*0.08;
  if(earDeploy<0.01) earDeploy=0;

  // Eye scan (slow down — every 2nd frame)
  if(frameN%2===0){ eyeFrame=(eyeFrame+1)%EYE_SCAN_X.length; eyeScanX=EYE_SCAN_X[eyeFrame]; eyeScanY=EYE_SCAN_Y[eyeFrame]; }
  frameN++;

  // Zzz scroll
  if(curExpr===EXPR.SLEEPING){
    if(prevExprForZzz!==EXPR.SLEEPING) zzzX=SCREEN_W-50;
    zzzX-=2;
    if(zzzX<-63) zzzX=SCREEN_W;
  } else {
    zzzX=SCREEN_W;
  }
  prevExprForZzz=curExpr;

  // WACKY3D auto-sweep: start forward, then rotate 20 degrees left/right.
  if(curExpr===EXPR.WACKY3D && w3AutoSpin && !w3Drag){
    const sweepT = (now - w3SweepStart) / W3_SWEEP_PERIOD;
    w3RotY = Math.sin(sweepT * Math.PI * 2) * W3_SWEEP_MAX;
  }
}

// ── WACKY3D: perspective-mapped face ──────────────────────────
// Render the WACKY face to a small texture, then map it onto a turning plane.
// One side of the plane gets shorter while the other gets taller, creating a
// vanishing-point perspective effect without sphere projection.

// Offscreen 2D canvases — WACKY face is rendered full-size, then shrunk into the perspective texture
const faceSrcCtx = (() => {
  const c=document.createElement('canvas');
  c.width=SCREEN_W*SCALE; c.height=SCREEN_H*SCALE;
  return c.getContext('2d');
})();
const faceTexCtx = (() => {
  const c=document.createElement('canvas');
  c.width=SCREEN_W*SCALE; c.height=SCREEN_H*SCALE;
  return c.getContext('2d');
})();
let w3FaceTexBounds = { x:0, y:0, w:0, h:0 };
let w3FaceTexData = null;

function drawWacky3DTexture(){
  const textureScale = 0.2;
  const textureHorizontalScale = 1;
  const textureVerticalScale = 1.69;
  const rotNorm = clamp(Math.sin(w3RotY) / Math.sin(W3_SWEEP_MAX), -1, 1);
  w3PupilShift = rotNorm;
  drawFaceToCtx(faceSrcCtx, EXPR.WACKY, { skipNose:true, skipTongue:true });
  w3PupilShift = 0;
  faceTexCtx.fillStyle = C_BG;
  faceTexCtx.fillRect(0, 0, faceTexCtx.canvas.width, faceTexCtx.canvas.height);
  faceTexCtx.imageSmoothingEnabled = false;
  const dstW = Math.round(faceSrcCtx.canvas.width * textureScale * textureHorizontalScale);
  const dstH = Math.round(faceSrcCtx.canvas.height * textureScale * textureVerticalScale);
  const dstX = Math.round((faceTexCtx.canvas.width - dstW) / 2);
  const dstY = Math.round((faceTexCtx.canvas.height - dstH) / 2);
  faceTexCtx.drawImage(faceSrcCtx.canvas, dstX, dstY, dstW, dstH);
  w3FaceTexBounds = { x:dstX, y:dstY, w:dstW, h:dstH };
  w3FaceTexData = faceTexCtx.getImageData(dstX, dstY, dstW, dstH);
}

function renderPerspectiveFace(mainCtx){
  const cx  = SCREEN_W / 2;
  const cy  = SCREEN_H / 2;
  const planeWidth = 238;
  const planeHeight = 295;
  const maxSideScale = 0.62;
  const minSideScale = 0.38;
  const b = w3FaceTexBounds;
  const texData = w3FaceTexData;

  // Full-viewport black background
  mainCtx.imageSmoothingEnabled = false;
  mainCtx.fillStyle=C_BG;
  mainCtx.fillRect(0,0,mainCtx.canvas.width,mainCtx.canvas.height);
  if(!texData) return;

  const rotNorm = clamp(Math.sin(w3RotY) / Math.sin(W3_SWEEP_MAX), -1, 1);
  const turn = Math.abs(rotNorm);
  const widthScale = 1 - turn * 0.28;
  const leftScale = clamp(1 + rotNorm * maxSideScale, minSideScale, 1 + maxSideScale);
  const rightScale = clamp(1 - rotNorm * maxSideScale, minSideScale, 1 + maxSideScale);
  const leftH = planeHeight * leftScale;
  const rightH = planeHeight * rightScale;
  const leftX = cx - planeWidth * widthScale * 0.5;
  const rightX = cx + planeWidth * widthScale * 0.5;
  const leftTop = cy - leftH * 0.5;
  const rightTop = cy - rightH * 0.5;

  for(let col=0; col<b.w; col++){
    const u0 = col / b.w;
    const u1 = (col + 1) / b.w;
    const dstX0 = leftX + (rightX - leftX) * u0;
    const dstX1 = leftX + (rightX - leftX) * u1;
    const dstTop0 = leftTop + (rightTop - leftTop) * u0;
    const dstTop1 = leftTop + (rightTop - leftTop) * u1;
    const dstH0 = leftH + (rightH - leftH) * u0;
    const dstH1 = leftH + (rightH - leftH) * u1;
    const dstX = Math.round(dstX0);
    const dstW = Math.max(1, Math.ceil(dstX1 - dstX0));
    const dstTop = (dstTop0 + dstTop1) * 0.5;
    const dstH = Math.max(1, (dstH0 + dstH1) * 0.5);
    let runStart = -1;
    for(let row=0; row<=b.h; row++){
      const inTexture = row < b.h;
      let hasInk = false;
      if(inTexture){
        const idx = (row * b.w + col) * 4;
        hasInk = texData.data[idx] + texData.data[idx+1] + texData.data[idx+2] > 12;
      }
      if(hasInk && runStart < 0) runStart = row;
      if((!hasInk || !inTexture) && runStart >= 0){
        const runH = row - runStart;
        const runMid = runStart + runH * 0.5;
        const runMidY = dstTop + (runMid / b.h) * dstH;
        const dstRunH = Math.max(1, Math.round((runH / b.h) * dstH));
        const dstRunY = Math.round(runMidY - dstRunH * 0.5);

        mainCtx.drawImage(
          faceTexCtx.canvas,
          b.x + col, b.y + runStart, 1, runH,
          dstX*SCALE, dstRunY*SCALE, dstW*SCALE, dstRunH*SCALE
        );
        runStart = -1;
      }
    }
  }

  const plane = {
    rotNorm,
    leftX, rightX,
    leftTop, rightTop,
    leftH, rightH
  };
  drawWacky3DNose(mainCtx, plane);
  drawWacky3DTongue(mainCtx, plane);
}

function drawWacky3DNose(mainCtx, plane) {
  const turn = Math.abs(plane.rotNorm);
  const mapPlane = (u,v) => ({
    x: plane.leftX + (plane.rightX - plane.leftX) * u,
    y: (plane.leftTop + (plane.rightTop - plane.leftTop) * u) +
       v * (plane.leftH + (plane.rightH - plane.leftH) * u)
  });
  const bridge = mapPlane((NX + NW * 0.5) / SCREEN_W, (NY - 4) / SCREEN_H);
  const root = mapPlane((NX + NW * 0.5) / SCREEN_W, (NY + 1) / SCREEN_H);
  // Push the wider lower third toward the viewer; keep the narrow top anchored.
  const tipShiftX = plane.rotNorm * 8.4;
  const tipShiftY = 0;
  const tipX = root.x + tipShiftX;
  const tipY = root.y + tipShiftY;
  const noseW = (15.4 - turn * 0.7) * SCALE;
  const noseH = 16.8*SCALE;

  mainCtx.save();
  mainCtx.fillStyle=C_NOSE;
  mainCtx.beginPath();
  mainCtx.moveTo(bridge.x*SCALE, bridge.y*SCALE);
  mainCtx.bezierCurveTo(
    (bridge.x+noseW/SCALE*0.12)*SCALE, (bridge.y+5)*SCALE,
    (tipX+noseW/SCALE*0.42)*SCALE, (tipY+noseH/SCALE*0.28)*SCALE,
    (tipX+noseW/SCALE*0.5)*SCALE, (tipY+noseH/SCALE*0.58)*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX+noseW/SCALE*0.82)*SCALE, (tipY+noseH/SCALE*0.74)*SCALE,
    (tipX+noseW/SCALE*0.24)*SCALE, (tipY+noseH/SCALE*0.98)*SCALE,
    tipX*SCALE, (tipY+noseH/SCALE)*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX-noseW/SCALE*0.24)*SCALE, (tipY+noseH/SCALE*0.98)*SCALE,
    (tipX-noseW/SCALE*0.82)*SCALE, (tipY+noseH/SCALE*0.74)*SCALE,
    (tipX-noseW/SCALE*0.5)*SCALE, (tipY+noseH/SCALE*0.58)*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX-noseW/SCALE*0.42)*SCALE, (tipY+noseH/SCALE*0.28)*SCALE,
    (bridge.x-noseW/SCALE*0.12)*SCALE, (bridge.y+5)*SCALE,
    bridge.x*SCALE, bridge.y*SCALE
  );
  mainCtx.fill();
  mainCtx.restore();
}

function drawWacky3DTongue(mainCtx, plane) {
  const phase=millis()*0.002;
  const wave=Math.sin(phase);
  const mapPlane = (u,v) => ({
    x: plane.leftX + (plane.rightX - plane.leftX) * u,
    y: (plane.leftTop + (plane.rightTop - plane.leftTop) * u) +
       v * (plane.leftH + (plane.rightH - plane.leftH) * u)
  });
  const root = mapPlane((MX + MW * 0.5) / SCREEN_W, (MY + 31) / SCREEN_H);
  const turn=Math.abs(plane.rotNorm);
  const tipBob=wave * 8;
  const curl=wave * 2;
  const frontRoll=wave < 0 ? wave * 12 : wave * 10;
  const baseW=5*SCALE;
  const midW=9*SCALE;
  const tipW=(15 - turn * 1.5)*SCALE;
  const tipH=8*SCALE;
  const tipMarginX=tipW/SCALE*0.6;
  const tipMarginY=tipH/SCALE+Math.abs(curl)+Math.abs(frontRoll)+2;
  const rootMarginX=baseW/SCALE*0.5;
  root.x=clamp(root.x,rootMarginX,SCREEN_W-rootMarginX);
  root.y=clamp(root.y,0,SCREEN_H-tipMarginY-16);
  const tipX=clamp(root.x + plane.rotNorm * 6.5,tipMarginX,SCREEN_W-tipMarginX);
  const tipY=clamp(root.y + 15 + tipBob,0,SCREEN_H-tipMarginY);
  const frontY=tipY+tipH/SCALE+frontRoll;

  mainCtx.save();
  mainCtx.strokeStyle=C_BG;
  mainCtx.lineWidth=2*SCALE;
  mainCtx.beginPath();
  mainCtx.moveTo((root.x-baseW/SCALE*0.5)*SCALE, root.y*SCALE);
  mainCtx.bezierCurveTo(
    (root.x-midW/SCALE*0.5)*SCALE, (root.y+5)*SCALE,
    (tipX-tipW/SCALE*0.5)*SCALE, (tipY-4.5)*SCALE,
    (tipX-tipW/SCALE*0.5)*SCALE, tipY*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX-tipW/SCALE*0.58)*SCALE, (tipY+tipH/SCALE*0.65-curl*0.15)*SCALE,
    (tipX-tipW/SCALE*0.44)*SCALE, (frontY+3-curl*0.2)*SCALE,
    tipX*SCALE, (frontY+3)*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX+tipW/SCALE*0.44)*SCALE, (frontY+3+curl*0.2)*SCALE,
    (tipX+tipW/SCALE*0.58)*SCALE, (tipY+tipH/SCALE*0.65+curl*0.15)*SCALE,
    (tipX+tipW/SCALE*0.5)*SCALE, tipY*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX+tipW/SCALE*0.5)*SCALE, (tipY-4.5)*SCALE,
    (root.x+midW/SCALE*0.5)*SCALE, (root.y+5)*SCALE,
    (root.x+baseW/SCALE*0.5)*SCALE, root.y*SCALE
  );
  mainCtx.closePath();
  mainCtx.stroke();

  mainCtx.fillStyle=C_TONGUE;
  mainCtx.beginPath();
  mainCtx.moveTo((root.x-baseW/SCALE*0.5)*SCALE, root.y*SCALE);
  mainCtx.bezierCurveTo(
    (root.x-midW/SCALE*0.5)*SCALE, (root.y+5)*SCALE,
    (tipX-tipW/SCALE*0.5)*SCALE, (tipY-4.5)*SCALE,
    (tipX-tipW/SCALE*0.5)*SCALE, tipY*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX-tipW/SCALE*0.58)*SCALE, (tipY+tipH/SCALE*0.65-curl*0.15)*SCALE,
    (tipX-tipW/SCALE*0.44)*SCALE, (frontY+3-curl*0.2)*SCALE,
    tipX*SCALE, (frontY+3)*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX+tipW/SCALE*0.44)*SCALE, (frontY+3+curl*0.2)*SCALE,
    (tipX+tipW/SCALE*0.58)*SCALE, (tipY+tipH/SCALE*0.65+curl*0.15)*SCALE,
    (tipX+tipW/SCALE*0.5)*SCALE, tipY*SCALE
  );
  mainCtx.bezierCurveTo(
    (tipX+tipW/SCALE*0.5)*SCALE, (tipY-4.5)*SCALE,
    (root.x+midW/SCALE*0.5)*SCALE, (root.y+5)*SCALE,
    (root.x+baseW/SCALE*0.5)*SCALE, root.y*SCALE
  );
  mainCtx.closePath();
  mainCtx.fill();

  mainCtx.strokeStyle=C_TONGUE_DIM;
  mainCtx.lineWidth=SCALE;
  mainCtx.beginPath();
  mainCtx.moveTo(root.x*SCALE, (root.y+2)*SCALE);
  mainCtx.bezierCurveTo(
    root.x*SCALE, (root.y+6.5+wave*0.8)*SCALE,
    tipX*SCALE, (tipY+4+tipBob*0.1)*SCALE,
    tipX*SCALE, (frontY+2.5)*SCALE
  );
  mainCtx.stroke();

  mainCtx.restore();
}

function loop(){ update(); render(); requestAnimationFrame(loop); }

// ── Keyboard ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map={'1':EXPR.NEUTRAL,'2':EXPR.HAPPY,'3':EXPR.ANGRY,'4':EXPR.SURPRISED,
             '5':EXPR.ANXIETY,'6':EXPR.WACKY,'7':EXPR.LISTENING,'8':EXPR.SLEEPING,
             '9':EXPR.SAD,'0':EXPR.WACKY3D,'l':EXPR.LOVING,'L':EXPR.LOVING,
             's':EXPR.SCARY,'S':EXPR.SCARY,'d':EXPR.DIZZY,'D':EXPR.DIZZY};
  if(map[e.key]!==undefined){
    setExpression(map[e.key]);
  }
  if(e.key==='b'||e.key==='B'){ eyeOpen=false; blinkEndTime=millis()+300; }
});

const siteMenu = document.querySelector('.site-menu');
const menuToggle = document.querySelector('.menu-toggle');

function setMenuOpen(isOpen) {
  siteMenu.dataset.open = String(isOpen);
  menuToggle.setAttribute('aria-expanded', String(isOpen));
  menuToggle.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
}

menuToggle.addEventListener('click', () => {
  setMenuOpen(siteMenu.dataset.open !== 'true');
});

document.addEventListener('click', event => {
  if (!siteMenu.contains(event.target)) setMenuOpen(false);
});

document.addEventListener('keydown', event => {
  if (event.key === 'Escape') setMenuOpen(false);
});

document.querySelectorAll('.menu-panel a').forEach(link => {
  link.addEventListener('click', () => {
    setMenuOpen(false);
  });
});

// Mouse drag to rotate WACKY3D, double-click to resume auto-sweep
mainCanvas.addEventListener('mousedown', e => {
  if(curExpr!==EXPR.WACKY3D) return;
  w3Drag=true; w3AutoSpin=false;
  w3DragLast={x:e.clientX, y:e.clientY};
});
mainCanvas.addEventListener('mousemove', e => {
  if(!w3Drag) return;
  w3RotY+=(e.clientX-w3DragLast.x)*0.008;
  w3RotX+=(e.clientY-w3DragLast.y)*0.008;
  w3RotX=Math.max(-Math.PI/2, Math.min(Math.PI/2, w3RotX));
  w3DragLast={x:e.clientX, y:e.clientY};
});
mainCanvas.addEventListener('mouseup',    () => w3Drag=false);
mainCanvas.addEventListener('mouseleave', () => w3Drag=false);
mainCanvas.addEventListener('dblclick',   () => {
  if(curExpr===EXPR.WACKY3D){
    w3RotY=0;
    w3SweepStart=millis();
    w3AutoSpin=true;
  }
});

loop();

</script>
