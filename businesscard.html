<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="assets/images/happy.png">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
}

.wrap {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 14px 14px;
    box-sizing: border-box;
}

.card {
    width: 100%;
    max-width: 420px;
    background: #000;
    border: 2px solid #2a6f78;
    padding: 28px;
    box-sizing: border-box;
    text-align: center;
}

.createdby {
    color: #bbbbbb;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
}

.logo {
    font-size: 44px;
    font-weight: bold;
    color: #00E5FF;
    margin-bottom: 12px;
    letter-spacing: 2px;
    line-height: 1.1;
}

.tagline {
    color: #bbbbbb;
    font-size: 15px;
    line-height: 1.4;
    margin-bottom: 24px;
}

.button {
    display: block;
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    background: transparent;
    text-decoration: none;
    color: #7dd3fc;
    border: 2px solid #2a6f78;
    font-size: 16px;
    font-weight: bold;
    transition: all .2s ease;
    box-sizing: border-box;
    font-family: inherit;
    cursor: pointer;
    appearance: none;
}

.button:hover {
    background: #003840;
    color: #ffffff;
}

.contact-button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.contact-button::before {
    content: "";
    width: 24px;
    height: 16px;
    border: 2px solid currentColor;
    box-sizing: border-box;
    background:
        linear-gradient(currentColor, currentColor) 12px 5px / 7px 2px no-repeat,
        linear-gradient(currentColor, currentColor) 12px 10px / 8px 2px no-repeat,
        radial-gradient(circle, currentColor 0 3px, transparent 3px) 5px 8px / 8px 8px no-repeat;
}

.footer {
    margin-top: 18px;
    color: #666666;
    font-size: 12px;
    letter-spacing: 1px;
}

.site-menu {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 20;
    font-family: Arial, Helvetica, sans-serif;
}

.menu-toggle {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    background: #02191d;
    border: 2px solid #00E5FF;
    color: #7dd3fc;
    box-shadow: 0 0 0 1px rgba(0, 229, 255, .24);
    cursor: pointer;
}

.menu-toggle:hover,
.menu-toggle:focus {
    background: #003840;
    color: #fff;
    outline: none;
}

.menu-toggle span,
.menu-toggle::before,
.menu-toggle::after {
    content: "";
    display: block;
    width: 20px;
    height: 2px;
    background: currentColor;
    transition: transform .2s ease, opacity .2s ease;
}

.menu-toggle::before {
    transform: translateY(-6px);
}

.menu-toggle::after {
    transform: translateY(6px);
}

.site-menu[data-open="true"] .menu-toggle span {
    opacity: 0;
}

.site-menu[data-open="true"] .menu-toggle::before {
    transform: translateY(2px) rotate(45deg);
}

.site-menu[data-open="true"] .menu-toggle::after {
    transform: translateY(-2px) rotate(-45deg);
}

.menu-panel {
    position: absolute;
    top: 54px;
    left: 0;
    width: min(260px, calc(100vw - 28px));
    display: none;
    padding: 10px;
    background: #000;
    border: 2px solid #00E5FF;
    box-shadow: 0 16px 40px rgba(0, 0, 0, .42);
}

.site-menu[data-open="true"] .menu-panel {
    display: grid;
    gap: 8px;
}

.menu-panel a {
    display: block;
    padding: 12px;
    color: #7dd3fc;
    border: 1px solid #2a6f78;
    font-size: 14px;
    font-weight: bold;
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.menu-panel a:hover,
.menu-panel a:focus {
    background: #003840;
    color: #fff;
    outline: none;
}

@media (max-width: 600px) {
    .wrap {
        align-items: center;
        padding: 14px;
    }

    .logo {
        font-size: 38px;
    }
}
</style>
</head>

<body>

<script src="assets/site-menu.js"></script>

<div class="wrap">
    <div class="card">

        <div class="createdby">Created by:</div>

        <div class="logo">Paul Hodara</div>

        <div class="tagline">
            Making tools, art, and technology that connect people
        </div>

        <a class="button" href="index.html">
            Vidiotbox-website
        </a>

        <a class="button" href="https://www.instagram.com/phodara" target="_blank">
            Follow me on Instagram
        </a>

        <a class="button" href="https://www.paulhodara.com" target="_blank">
            My Photgraphy
        </a>

        <a class="button" href="https://www.linkedin.com/in/paulhodara/" target="_blank">
            Connect with me on LinkedIn
        </a>

        <a class="button" href="https://github.com/phodara" target="_blank">
            My stuff on GitHub
        </a>

        <a class="button" href="https://www.thelivingmuseum.org" target="_blank">
            The Living Museum
        </a>

        <button class="button" id="emailButton" type="button">
            Email
        </button>

        <a class="button contact-button" href="paul-hodara.vcf">
            Add to Contacts
        </a>

        <div class="footer">
            TOTALLY USELESS DIGITAL ART
        </div>

    </div>
</div>

<script>
document.getElementById('emailButton').addEventListener('click', function () {
    const user = ['p', 'h', 'o', 'd', 'a', 'r', 'a'].join('');
    const host = ['g', 'm', 'a', 'i', 'l'].join('') + '.' + ['c', 'o', 'm'].join('');
    window.location.href = 'mailto:' + user + '@' + host;
});

</script>

</body>
</html>
